<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h3>Productivity AI Agent</h3>

    <label>LM Studio Base URL:</label>
    <input id="baseUrl" placeholder="http://127.0.0.1:1234" value="http://127.0.0.1:1234">

    <label>Model:</label>
    <input id="model" placeholder="local-model" value="local-model">

    <button id="saveLmstudioConfig">Save Config</button>

    <hr>

    <h4>Explicit Block</h4>
    <input id="blockInput" placeholder="https://bad.com">
    <button id="addBlock">Block</button>
    <ul id="blockList"></ul>

    <h4>Whitelist (Always Allow)</h4>
    <input id="whiteInput" placeholder="https://good.com">
    <button id="addWhite">Whitelist</button>
    <ul id="whiteList"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
